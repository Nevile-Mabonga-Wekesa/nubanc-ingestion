name: Nubanc CI/CD

on:
  push:
    branches:
      - main
      - dev
      - staging
  pull_request:
    branches:
      - main


jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      NUBANC_ENV: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint
        run: |
          pip install flake8
          flake8 replay engines tests

      - name: Run tests
        run: |
          python -m unittest discover -s tests

      # --- Email Notification on Failure ---
      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ smtp.gmail.com }}
          server_port: ${{ 587 }}
          username: ${{ nevillewekesa2022@gmail.com }}
          password: ${{ Neville2022. }}
          subject: " Nubanc CI/CD Failed on ${{ github.ref }}"
          to: ${{ engineering@nubanclabs.com, neville@nubanclabs.com }}
          from: ${{ neville@nubanclabs.com }}
          body: "The CI/CD pipeline for branch ${{ github.ref }} in repository ${{ github.repository }} has failed. See details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
